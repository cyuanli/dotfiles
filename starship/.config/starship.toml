"$schema" = 'https://starship.rs/config-schema.json'

palette = 'nord'
add_newline = false

format = """
[‚ĖĎ‚Ėí‚Ėď](nord10)\
$os$username$hostname\
[ ](bg:nord10)[Óāį](bg:nord9 fg:nord10)\
$directory\
[Óāį](fg:nord9 bg:nord8)\
$git_branch$git_status\
$character\
"""

right_format = """$cmd_duration$time"""

[os]
style = "bg:nord10 fg:nord4"
format = '[ $symbol ]($style)'
disabled = false

[username]
show_always = false
style_user = "bg:nord10 fg:nord4"
style_root = "bg:nord10 fg:nord12"
format = '[$user]($style)'
disabled = false

[hostname]
style = "bg:nord10 fg:nord4"
ssh_only = true
ssh_symbol = ' ūüĆź'
format = '[@$hostname$ssh_symbol]($style)'
disabled = false

[directory]
style = "bg:nord9 fg:nord4"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[directory.substitutions]
"Documents" = "ůįąô"
"Downloads" = "ÔÄô"
"Music" = "ÔÄĀ"
"Pictures" = "ÔÄĺ"

[character]
success_symbol = '[Óāį](bg:nord14 fg:nord8)[Óāį](nord14)'
error_symbol = '[Óāį](bg:nord11 fg:nord8)[Óāį](nord11)'

[git_branch]
symbol = "Ôźė"
style = "bg:nord8 fg:nord4"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:nord8 fg:nord4"
format = '[$all_status$ahead_behind ]($style)'

[cmd_duration]
disabled = false
show_milliseconds = true
format = "[ ÔČí $duration]($style)"
style = "nord9"
show_notifications = true

[time]
disabled = false
format = "[ Ôźļ $time]($style)"
time_format = "%R"
utc_time_offset = "local"
style = "nord10"

